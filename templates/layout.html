<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet" />
    <style>
        body {
            background-color: #94AFCF;
        }
        
        .form-input-custom {
            background-color: #FFFFFF;
            border-radius: 0.5rem;
            border: none;
            color: #6B7280;
            padding: 0.75rem 1rem;
        }

        .error-text-custom {
            color: #FF0000;
            font-weight: 700;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #94AFCF; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900 min-h-screen font-sans antialiased">

    <nav class="sticky top-0 z-50 bg-[#0F172A] border-b border-slate-700 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <a href="{{ url_for('index') }}" class="flex items-center group">
                        <div class="bg-orange-600 p-2 rounded-lg shadow-lg">
                            <img src="{{url_for('static',filename='img/logo.png')}}" class="h-6 w-6" alt="Logo">
                        </div>
                        <span class="ml-3 self-center text-xl font-black tracking-tighter uppercase text-white">
                            Pizz<span class="text-orange-500">ería</span>
                        </span>
                    </a>
                </div>

                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-4">
                        <a href="{{ url_for('pedidos.index') }}" 
                           class="px-3 py-2 rounded-md text-sm font-bold uppercase tracking-wider transition-colors hover:text-orange-500 {{ 'text-orange-500 bg-slate-800' if request.endpoint == 'pedidos.index' else 'text-slate-300' }}">
                           🛒 Pedidos
                        </a>
                        <a href="{{ url_for('ventas.index') }}" 
                           class="px-3 py-2 rounded-md text-sm font-bold uppercase tracking-wider transition-colors hover:text-orange-500 {{ 'text-orange-500 bg-slate-800' if request.endpoint == 'ventas.index' else 'text-slate-300' }}">
                           📊 Reportes
                        </a>
                    </div>
                </div>

                <div class="md:hidden">
                    <button data-collapse-toggle="mobile-menu" type="button" class="text-slate-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>
   
    <main class="max-w-7xl mx-auto mt-8 px-4 sm:px-6 lg:px-8 pb-24">
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="space-y-4 mb-8">
                {% for message in messages %}
                    <div id="alert-{{ loop.index }}" class="flex items-center p-4 bg-white border-l-4 border-orange-500 rounded-r-lg shadow-md animate-fade-in" role="alert">
                        <div class="ml-3 text-sm font-bold text-slate-800 uppercase tracking-wide">
                            {{ message }}
                        </div>
                        <button type="button" class="ml-auto text-slate-400 hover:text-slate-600" data-dismiss-target="#alert-{{ loop.index }}">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
       
        <div class="animate-fade-in">
            {% block container %}
            {% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
